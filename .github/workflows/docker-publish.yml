name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, for example v4.8.5.8'
        required: true
        type: string

jobs:
  docker:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          if [ -z "$VERSION" ]; then
            echo "Version is empty"
            exit 1
          fi

          VERSION_NO_V="${VERSION#v}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_no_v=$VERSION_NO_V" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          file: ./Dockerfile
          push: true
          build-args: |
            CHILLPOSTER_VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.run_id }}
          tags: |
            chillne/chillposter:${{ steps.version.outputs.version }}-${{ matrix.suffix }}
            chillne/chillposter:${{ steps.version.outputs.version_no_v }}-${{ matrix.suffix }}
            chillne/chillposter:latest-${{ matrix.suffix }}

  manifest:
    name: Publish multi-arch manifest
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          if [ -z "$VERSION" ]; then
            echo "Version is empty"
            exit 1
          fi

          VERSION_NO_V="${VERSION#v}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_no_v=$VERSION_NO_V" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish version manifest
        shell: bash
        run: |
          docker buildx imagetools create \
            -t chillne/chillposter:${{ steps.version.outputs.version }} \
            chillne/chillposter:${{ steps.version.outputs.version }}-amd64 \
            chillne/chillposter:${{ steps.version.outputs.version }}-arm64

          docker buildx imagetools create \
            -t chillne/chillposter:${{ steps.version.outputs.version_no_v }} \
            chillne/chillposter:${{ steps.version.outputs.version_no_v }}-amd64 \
            chillne/chillposter:${{ steps.version.outputs.version_no_v }}-arm64

          docker buildx imagetools create \
            -t chillne/chillposter:latest \
            chillne/chillposter:latest-amd64 \
            chillne/chillposter:latest-arm64

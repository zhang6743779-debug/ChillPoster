name: Build and Publish GHCR Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag, for example v1.0.0. Leave empty to publish latest."
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="latest"
          fi

          VERSION_NO_V="${VERSION#v}"

          {
            echo "image=${IMAGE}"
            echo "version=${VERSION}"
            echo "tags<<EOF"
            echo "${IMAGE}:${VERSION}-${{ matrix.suffix }}"
            if [ "${VERSION_NO_V}" != "${VERSION}" ]; then
              echo "${IMAGE}:${VERSION_NO_V}-${{ matrix.suffix }}"
            fi
            if [ "${VERSION}" != "latest" ]; then
              echo "${IMAGE}:latest-${{ matrix.suffix }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          file: ./Dockerfile
          push: true
          build-args: |
            CHILLPOSTER_VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ github.run_id }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="latest"
          fi

          VERSION_NO_V="${VERSION#v}"

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION_NO_V}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish manifests
        shell: bash
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          VERSION="${{ steps.meta.outputs.version }}"
          VERSION_NO_V="${{ steps.meta.outputs.version_no_v }}"

          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

          if [ "${VERSION_NO_V}" != "${VERSION}" ]; then
            docker buildx imagetools create \
              -t "${IMAGE}:${VERSION_NO_V}" \
              "${IMAGE}:${VERSION_NO_V}-amd64" \
              "${IMAGE}:${VERSION_NO_V}-arm64"
          fi

          if [ "${VERSION}" != "latest" ]; then
            docker buildx imagetools create \
              -t "${IMAGE}:latest" \
              "${IMAGE}:latest-amd64" \
              "${IMAGE}:latest-arm64"
          fi
